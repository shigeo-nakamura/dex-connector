name: Deploy Lighter rate-limit sidecar

# Phase 1 (bot-strategy#101) — manual dispatch only. Once we verify a hand
# deploy produces the same binary and healthy service as the current slow-mm
# pipeline, we'll add a `push:` trigger on tag `v*.*.*` and remove the
# sidecar steps from slow-mm's CI.
#
# Multi-region (bot-strategy#220): build once, fan out SSM install to every
# Lighter-running instance. Targets are hardcoded below — one entry per
# instance hosting a Lighter client process.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "dex-connector ref to build from (default: whatever was checked out)"
        required: false
        type: string

concurrency:
  group: lighter-ratelimit-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AL2023_IMAGE: public.ecr.aws/amazonlinux/amazonlinux:2023
  # Same bucket slow-mm uses today; when slow-mm drops sidecar ownership
  # (phase 3 of #101) the keys stay where clients already expect them.
  # The bucket lives in eu-central-1; cross-region SSM clients pull from it
  # at install time only, so the extra hop is negligible.
  SIDECAR_S3_PREFIX: lighter-ratelimit
  SIDECAR_UNIT_S3_KEY: deploy/lighter-ratelimit.service
  BUILD_REGION: eu-central-1

jobs:
  build:
    # Inherits the same secrets the slow-mm pipeline used:
    #   AWS_ROLE_ARN, S3_BUCKET (or their `vars.*` equivalents).
    # Register them on this repo before the first dispatch.
    runs-on: ubuntu-latest
    environment: sidecar
    steps:
      - name: Checkout dex-connector
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cache cargo (linux/arm64)
        uses: actions/cache@v5
        with:
          path: |
            .cache/cargo/registry
            .cache/cargo/git
            .cache/cargo/bin
            .cache/rustup
            target
          key: ${{ runner.os }}-cargo-arm64-sidecar-${{ hashFiles('Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-arm64-sidecar-

      - name: Build lighter-ratelimit (linux/arm64)
        run: |
          mkdir -p .cache/cargo/registry .cache/cargo/git .cache/cargo/bin .cache/rustup target
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e CARGO_HOME=/workspace/.cache/cargo \
            -e RUSTUP_HOME=/workspace/.cache/rustup \
            -e CARGO_INCREMENTAL=0 \
            ${AL2023_IMAGE} \
            /bin/bash -lc "set -euo pipefail; \
              dnf -y install gcc gcc-c++ make openssl-devel pkgconf-pkg-config git curl-minimal tar gzip; \
              if [ ! -x /workspace/.cache/cargo/bin/rustup ]; then \
                curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable; \
              fi; \
              export PATH=/workspace/.cache/cargo/bin:\$PATH; \
              rustc -V; cargo -V; \
              cargo build --release -p lighter-ratelimit --bin lighter-ratelimit; \
              chown -R \${HOST_UID}:\${HOST_GID} /workspace/target /workspace/.cache/cargo /workspace/.cache/rustup"

      - name: Fix cache permissions
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" .cache/cargo .cache/rustup target
          fi

      - name: Sanity-check binary
        run: |
          file target/release/lighter-ratelimit
          # Expect ARM aarch64 ELF — guard against an accidental host-arch build.
          file target/release/lighter-ratelimit | grep -q aarch64

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.BUILD_REGION }}

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
        run: |
          aws s3 cp target/release/lighter-ratelimit \
            "s3://${S3_BUCKET}/${SIDECAR_S3_PREFIX}/lighter-ratelimit"
          aws s3 cp deploy/lighter-ratelimit.service \
            "s3://${S3_BUCKET}/${SIDECAR_UNIT_S3_KEY}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: frankfurt
            region: eu-central-1
            instance_id: i-0c08fba996bc21879
          - target: tokyo
            region: ap-northeast-1
            instance_id: i-015f7f9388cac0a1b
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Deploy via SSM (install, enable, start, verify) [${{ matrix.target }}]
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
          INSTANCE_ID: ${{ matrix.instance_id }}
        run: |
          cat > /tmp/ssm-params.json <<'JSON'
          {
            "commands": [
              "sudo mkdir -p /opt/lighter-ratelimit/bin",
              "aws s3 cp s3://__S3_BUCKET__/__SIDECAR_S3_PREFIX__/lighter-ratelimit /opt/lighter-ratelimit/bin/lighter-ratelimit",
              "sudo chmod 755 /opt/lighter-ratelimit/bin/lighter-ratelimit",
              "aws s3 cp s3://__S3_BUCKET__/__SIDECAR_UNIT_S3_KEY__ /tmp/lighter-ratelimit.service",
              "if [ ! -f /etc/systemd/system/lighter-ratelimit.service ] || ! cmp -s /etc/systemd/system/lighter-ratelimit.service /tmp/lighter-ratelimit.service; then sudo mv /tmp/lighter-ratelimit.service /etc/systemd/system/lighter-ratelimit.service; sudo systemctl daemon-reload; else rm /tmp/lighter-ratelimit.service; fi",
              "sudo systemctl enable lighter-ratelimit.service",
              "if systemctl is-active --quiet lighter-ratelimit; then sudo systemctl restart lighter-ratelimit && echo 'Restarted lighter-ratelimit'; else sudo systemctl start lighter-ratelimit && echo 'Started lighter-ratelimit'; fi",
              "sleep 2 && systemctl is-active --quiet lighter-ratelimit || { echo 'lighter-ratelimit failed to start'; sudo journalctl -u lighter-ratelimit -n 30 --no-pager; exit 1; }",
              "sudo journalctl -u lighter-ratelimit -n 5 --no-pager"
            ]
          }
          JSON
          sed -i "s|__S3_BUCKET__|${S3_BUCKET}|g; \
                  s|__SIDECAR_S3_PREFIX__|${SIDECAR_S3_PREFIX}|g; \
                  s|__SIDECAR_UNIT_S3_KEY__|${SIDECAR_UNIT_S3_KEY}|g" /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy lighter-ratelimit sidecar (dex-connector) [${{ matrix.target }}]" \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          WAIT_STATUS=$?
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}" --output text
          exit $WAIT_STATUS
